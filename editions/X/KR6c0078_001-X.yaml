body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯奉佛弟子翁春王錫琯解釋金剛般若波羅蜜經釋金剛者金中精堅者也剛生金中百煉不銷利能斷物譬如智慧能斷絕貪嗔癡一切顛倒之想梵言般若此云智慧梵云波羅蜜此云到彼岸欲到彼岸須憑智慧經者此經乃學佛之路徑也法會因由分第一此分敘說法聚會因緣之所由起考大般若經有六百卷凡說十六會此則五百七十七卷給孤園第二處第九會也按前此佛在鹿野苑轉四諦十二行法輪恐人遂著有相因於般若會上闡無相正宗要人見性成佛不許向心外一絲著取所以掃求佛相埽取菩薩相埽能度生相埽泥言說相埽著修行相而併不生斷滅相空而不空有而非有見性如如法會大事畢於斯矣佛有大弟子阿難迦葉二人共述此經其言曰如是經之所言乃我親聞之於佛者彼一時也佛在舍衛波斯匿王之國城外有太子祗陀所施之樹給孤獨長者須達拏所買之園內建精舍請佛說法佛與得道深者大比丘之徒眾千二百五十人俱在焉於爾之時佛為世界之尊當將午食時著僧伽之大衣持四天王所獻之鉢往入舍衛大城向人家乞食於其城中不擇貴賤作平等觀次第而乞乞食已竟還至本處園中將乞來之食各飯食訖收其衣鉢洗其跣足已畢乃敷陳高座而結跏趺以坐於是可以隨宜明道矣釋佛滅度時阿難啟請一切經首當置何語佛命置如是我聞四字為句佛者梵云婆伽婆唐言覺自覺覺他周遍法界舍衛國有一長者名須達拏常周給孤貧煢獨因有是稱彼欲卜勝地供佛惟祗陀太子園方廣莊嚴往問太子太子戲曰若布金滿園我當賣之須達拏運金側布八十頃園並滿太子不受因同建精舍故統明祗樹給孤獨園梵云比丘此云乞士乞法以明己之心乞食以種人之福佛為三界之尊故稱世尊三界者欲界色界無色界也善現起請分第二此分空生致敬起請所問皆菩薩分上事三四分佛亦以菩薩之事答之如是指所問三藐三菩提心故十七分問答仍前正增應生如是心及無有法二句其寔無有法正以離四相故而降伏之問以明維時有年長而老者名須菩提在於大眾中即從座上起立偏袒而露其右肩以示奉持之便右膝跪著于地合掌以致其恭敬之心而啟白於佛前乃言曰我佛萬法圓融真三界希有之世尊也以真如之性明慧通徹隨所而來現善能護衛眷念諸學佛之菩薩俾信受是法不受魔侵善能委付囑託諸學佛之菩薩俾奉行是法無時斷絕其慈悲導引如是今敢請問世尊有奉佛子善男子善女人思斷塵緣求生定慧因發阿耨多羅三藐三菩提心應云如之何得安住此心只在真性內云如之何降伏其一切妄想之心不使動搖真性乎佛歎美之而言曰善哉善哉如爾之問也須菩提果如汝所說如來慈悲導引善護念諸菩薩惡魔不侵善付囑諸菩薩退轉不生我將說此廣大之法汝今審諦聽受當如汝所問為汝詳說之今有善男子善女人能發阿耨多羅三藐三菩提心者欲求安住真性應知如是安住欲求降伏妄心即當如是降伏其心何也心亡則境空境空則心滅矣詞未畢而須菩提即應曰唯唯然哉我世尊之言乃弟子心願愛樂所欲聞者也釋梵云須菩提此云善吉善現空生尊者初生時相師占之唯吉唯善後解空法以顯前相如者佛之真性變現自如明以照無量世界慧以通無量劫事也來者真如發現隨處顯應也二字者兼體用言之梵云菩提此云覺梵云菩埵此云有情言能覺悟在有情之中也梵云阿此云無梵云耨多羅此云上梵云三此云正梵云藐此云等梵云菩提此云覺總云無上正等正覺也大乘正宗分第三大乘者言如大車之無不載也正宗者言為嫡裔而非旁枝也空生以安住降伏並舉今惟標降伏者何葢欲安住真心須先降伏妄心然趨寂猶易若推向度生則心與境接倘降伏稍不得力此中微細無明隱隱生動即離真常不得名住矣佛因呼而告之曰須菩提諸菩薩摩訶薩欲求安住此心須先降伏妄心應如是不思善不思惡降伏其心心滅境滅如我度脫眾生然豈可著一毫塵相乎世間所有一切眾生之類其類有九則有若迷性造業而為卵生者有若習性流轉而為胎生者有若邪氣結聚而為濕生者有若觸趣變化而為化生者此四種皆欲界眾生也離此則天人矣若夫分別是非未契無相之理但有色身而無男女之形已絕情欲矣此謂色界若夫執著空相不修福慧惟有靈識而全無色身若夫口說佛法心不依行靜寂無為而惟有想念此二者皆謂無色界若無想者坐禪除妄無有作用若非有想非無想者不著二法想故云非有求理心在故云非無此于三界諸天為極高壽為極長不止八萬劫而已凡此皆有不生滅之妙心仗佛法力我皆令悟入圓滿清淨義毫無餘剩習氣煩惱與形相知識直到不生謂涅不死謂槃之地將歷劫受生之累而斷滅淨盡度脫生死苦海至此則佛與眾生本性自如同登彼岸矣然眾生雖有本性不能自度今全仗道力開悟之及至如是滅度無限量無數目無邊岸如許眾生可云多矣其實眾生自明本性自度苦海佛法原不曾有增加于彼本無眾生得滅度者此何以故哉總為佛心平等不將眾生分別形相耳須菩提設若菩薩心有能所輕慢眾生是有我相也自恃持戒輕破戒者是有人相也厭三塗苦願生諸天是有眾生相也心愛長年勤修福業執法不忘是有壽者相也則已墮貪嗔癡愛四惡業矣有相即眾生無相即佛惟不以度眾生為功而了無所得以其四相盡除也設若起能度眾生之心是眾生之見則非菩薩也只這無相之心便是降伏妄心之法矣釋梵云菩薩摩訶薩此云覺眾生也摩訶言大也妙行無住分第四上問如何住此答無住者何常住者體也無住者用也無住之住是名真住又言如所教住即答安住降伏意兩大弟子復敘次佛言佛又呼而告之曰須菩提菩薩於此法要應當絕無方所住著此心將此無住著之心行於布施之事是所謂不住著于目之色塵冀有所獲而布施不住著于耳之聲鼻之香舌之味身之觸心之法諸塵冀有所獲而布施須菩提夫布施而住著于六塵與我本性何與菩薩受如來無相教法但以法施利益一切眾生應如是布施物我兩空不住著於形相是何以故葢凡人布施止為求滿情欲先施財于人後得福于己施財有盡則得福亦有盡若菩薩一心清淨利益一切不住著于形相內不見我之能施外不見我之受施布施遍滿虗空斯其福德誠不可思想度量也須菩提我謂菩薩功德莫量其於意云何哉葢菩薩不著形相法施廣大世界萬有包含無遺今試看東方虗空可能思量窮盡不乎須菩提答曰虗空而以思量盡之乎不也果如世尊之言也佛又曰須菩提南西北方以及四維上至天下至地其虗空處所可能思量窮盡不乎須菩提答曰虗空而以思量盡之乎不也果如世尊之言也佛因告之曰須菩提菩薩無住著形相之布施其應受福德亦復如是十方虗空之不可思量也須菩提菩薩今欲受如來教得住心妙法但應依不住相之言如所教以存住此性真可也葢有住著都是六塵無住著者乃是本心安住之所故無住為住乃真住也釋觸法之法非謂佛法是凡夫心中思想的法術也如理實見分第五如者猶俗言自在也性體常常自在全無更變此為真性之理故曰如理凡夫不能認著如理只為眼見虗妄形相將真寔本性撇去腦後就見如來三十二相與我真性有何干涉佛又呼須菩提欲明無相真性於意果是云何我試問汝如來既全佛性又有佛身可以三十二種莊嚴身相謂即此是見如來不乎須菩提答曰但見如來身相豈可謂便見如來不也世尊葢如來原不在身相上發現是不可以身相得見如來也何以故哉如來所說之身相原非形色葢是虛空中法身即非有真寔身相可見也佛又告須菩提曰凡世上有所一切諸形相雖然有此軀著而無真寔本性須臾消化還歸虗空豈非皆是虗妄若能識得此理見諸形相都非寔相則如來法身真相立便現前則見如來矣就色身中看出法身葢自性原有箇如來也釋太子名悉達多漢言頓吉生時三十二相八十種好放大光明普照三千大千世界正信希有分第六此分說人正心信受絕去一切形相良為希有也前空生初執有相因佛以不住相破之後疑無相因不能契有相果是執佛有相矣佛以如身非相破之以無相因契無相果豈不因果俱空人法雙泯此義甚深殊難信解故疑而問佛云云大祗眾生情念所動一有取著便涉非法誠使情念忘而智慧開降伏安心直下誠當矣須菩提又白佛言曰世尊今世人多迷少悟不誠眾迷之中頗有眾生得聞我佛如是言說之一章一句生真實信心當下了悟不耶佛告須菩提曰如來以度脫眾生為心深願其聽受我言汝切莫作是信否之說也如來滅度之後後經五百歲此時有持戒而諸惡不作修福而眾善奉行者於此一章之大意一句之解說能生信受之心以此為真實而無疑當知是信心之人自度度人利益無窮於將來作佛之眾生不止於一佛二佛三四五佛令之如我信心而種善根已能於無量千萬佛所皆令信心無二而種諸善根也可見此眾生聞是章句乃至一念生清淨信心去塵絕垢者須菩提此豈猶人之福德已乎如來悉知之悉見之是諸信心之眾生便得如是種無量善根之福德是果何以故哉因為是諸眾生聞佛妙法本性圓明形相都化無復有執定之我相對立之人相厭苦之眾生相貪愛之壽者相且無有傍依佛法智識相亦無捨去佛法塊守空寂之非法相諸相盡捐斯名淨信必須無相方是無量又何以故哉葢以是諸眾生若心中取有形相是則為牽著我人眾生壽者豈能真性到處圓滿若心中取有法相即為牽著我人眾生壽者豈能了悟真性無為自在夫何以故也良以真性原無容一毫牽著也豈惟是哉即令心中若取有非法相亦是即牽著我人眾生壽者豈能使真性空明方便應現乎職是之故所以不應取法而有法執并不應取非法而有空執總以是無妙相義原無可著故耳試觀如來度人常說汝等學佛之比丘須知我所說之法未明性時不可無言如未渡河不可無筏然一渡則棄之矣猶如取筏為喻可見到彼岸者佛法尚應捨去何況非佛正法乎真實生淨信者宜直下見性不受諸相隔礙矣釋信心者信般若波羅蜜能除一切煩惱能成就一切出世功德能生出一切諸佛信自身佛性本來清淨無有污染與佛無二信六道眾生本來無相信一切眾生盡得成佛是名淨信心也無得無說分第七真性空寂無有形相人若能悟性空即佛法與我何干却得個甚麼佛所說都是方便指迷的引子及到真性上一切言語總用不著却又說個甚麼此雙遣佛法知見也文中無有定法四字正是宗眼不但為空生指示無為法三字同法尚應捨則佛將安在耶須菩提汝於佛法大意亦知其云何哉如來無上正覺本自空寂豈于心外別有所得若指此覺性為如來所獨有則如來真有所獨得之阿耨多羅三藐三菩提耶且如來以此正覺廣為人說即謂如來之法直在言語上見則如來果曾有所說法耶須菩提答言曰如我之意解說佛所發問言說之義要知無上正覺深妙難名隨人證入無有一定之法斯名為阿耨多羅三藐三菩提則如來寔無所得也如來憫眾生沉迷以方便法引導性真所謂依病發藥可見亦無有定法如來可說也斯何以故法既不定則聽法之人又何可執以為定乎須知如來所說法可以性修皆不可以色相取可以心傳亦不可以言說求必人自悟自解乃得之耳葢法原無法斯云非法亦不離法見性斯云非非法有法無法俱不是從此得一是處方是真法所以學佛人不能立見如來者何止因一切修行賢聖皆以真性無為之法為證向但根器有淺深意解有偏正毫釐千里而有差等分別不能齊一與如來同體也是空生深契無相之理如是釋或持戒忍辱或精進禪定或聚沙塔頂禮或念南無佛號隨人所修是無定法或為志求勝法者說或為求無上慧者說或為求聲聞者說或為求辟支者說應機而酬是無定法依法出生分第八此分言諸佛妙道皆因此經生出教人依從法要總此一念散為千法萬法所謂福德性也空生固契無相之理矣而未契無相之理得無相之福也佛告之曰須菩提佛法究竟於大意云何解說也試以身外享用之福德與心內自有之福德相提而論便見虗寄在形為有盡真寔在心為無量矣設若有人廣以財施直到積滿三千大千世界之七寶都以用布施如此浩大是人所得福德亦當如布施之數寧為多不乎須菩提言曰此福德甚多有如世尊之言也然我說其福德多者何以故葢是等福德都是身外享用與真性無干即非福德出于真性者著在形色終是有數可筭是故如來但說其享用福德如許之多耳佛因須菩提已知身外福德如此乃取心內福德示之曰設若復有人於此經中所說真寔性義了悟明白一心承受時時把持勿令怠忘又能省却經文多句乃歸至直明性體之四句偈等自己明悟又為他人解說令人共明本性如此則利人利己較之施財其福勝彼夫何以故哉須菩提汝當知經文直明真性圓滿完足世上一切諸佛得成佛果乃諸佛所說阿耨多羅三藐三菩提之法皆從此經中悟出然此經文亦如河筏耳直認本性尚在語言文字之外也須菩提若人錯會經文所說法便是佛法不曾于性真寔有體認則其所謂佛法者皆有相之見耳即非真寔明心見性之佛法矣釋三千大千世界者此日月所照為一小世界其中間有須彌山日月繞山腰運行南為閻浮提東為弗婆提西為瞿耶尼北為單越是名四天下此山之高半出日月之上山上分四方每方有八所中間為一所謂之三十三天梵云忉利天是也日月運行于此四天下謂之一小世界如此一千小世界謂之小千如此一千小千世界謂之中千如此一千中千世界謂之大千以三次言千故云三千大千其寔一大千耳七寶者金銀琉璃珊瑚瑪瑙赤真珠玻瓈也四句偈諸解不一唯彌勒指無人我眾生壽者言要當活看等字也一相無相分第九此分言四果菩薩各有一相然不過就他地位略有次第其寔悟到真空豈有形可執佛告須菩提今已證四果之菩薩各有名目豈彼尚有分別形相心耶於其意果云何也如第一果之須陀洹已離欲界去凡入聖將其心尚能作是念見得我已證入得此須陀洹果位不乎須菩提答言曰須陀洹無得果之念不也世尊是何以故葢須陀洹離塵見性名為入聖之流輩而真性本空原無所入只此不入色聲香味觸法之塵便為入流豈是真有所入是名須陀洹耶佛又曰須菩提其他亦復如是汝於意中亦知其云何也又有第二果之斯陀含已離塵生天將其心尚能作是念見謂我已證入得此斯陀含果位不乎須菩提答言曰斯陀含無得果之念不也世尊何以故斯陀含色身一往天上一來人來不復再來人間名一往來而其前念起妄後念即覺止見一生滅無第二生滅雖有往來不著往來之相而實無往來豈真著塵緣去留之相而始曰是我纔得名斯陀含耶佛又曰須菩提汝於意云何也復有第三果之阿那含能作是念謂我已證入得此阿那含果不耶須菩提答言阿那含無此念不也世尊何以故蓋阿那含內無欲心外無欲境已離欲界心無執著雖名為不來而實無不來之相是故但名為阿那含耳豈遂有得果之見哉佛又言須菩提汝於意云何也復有第四果之阿羅漢能作是念謂我已證得得阿羅漢道不也須菩提言不也世尊何以故佛法本空有何定法唯其實無有法故第名為阿羅漢耳世尊若阿羅漢作是念我得阿羅漢道即為著我人眾生壽者四相之妄念矣豈得成人法雙遣之阿羅漢道乎且須陀洹斯陀含阿那含皆言果而阿羅漢言道者至此方為證道也夫阿羅漢與須陀洹造就不同有淺深而異名耳即道與法亦是假名在教為法在行為道無法則無道無道則無得矣且世尊不常念之乎我佛說我無爭念無人我之相有正定故能得無諍三昧人中明了真性最為第一是第一等離去六欲超出物表之阿羅漢也佛雖如此稱道我乎我却不作是念得見我是離欲阿羅漢世尊我若作是念自謂我得阿羅漢道便是執法不忘著於有相世尊即不稱許說須菩提已證無諍三昧是悅樂阿蘭那行者之人矣今之稱許者正以須菩提法性都空實無有所執之道行而名之以須菩提是能樂阿蘭那行也我佛以為何如可見四果菩薩既空塵相猶恐一絲未斷故如來與須菩提反覆問答一一解破使之悟徹無相真寔了義不受纖毫牽挂耳釋梵云三昧亦云三摩地亦云王摩提此云正定言入定之法正也亦云正見遠離九十五種邪見也亦云正受言定中所想境界而受之非是妄想也梵云阿蘭那此云無諍莊嚴淨土分第十真性不散亂便是莊邪妄不能入便是嚴淨土者清淨心也無所住而生其心即生清淨心也此經十七分應生如是心即此無所住而生其心也無所住之心便是無心而如是生清淨心便是不滅無生之生何礙于生知不滅便是生不必更求生相矣二十七分中于法不生斷滅即此義也佛告須菩提曰人到修行成佛時於彼意中是云何等心境乎即我如來往昔之時在本師然燈佛所於佛法果寔有所得不須菩提答曰我佛心空萬有豈尚存有得之心不也世尊如來在然燈佛所雖有傳授然返觀本性原所自有於佛法實無所得也佛又言曰須菩提法既無得其於意中畢竟是云何等乎菩薩住之所在果是莊嚴佛土不也須菩提答曰不也世尊我說菩薩不是莊嚴佛土何以故哉葢以莊嚴佛土者止在真性中清淨自如耳不著形相即非有莊嚴迹象獨見真性光明是名為莊嚴佛土也佛許可其言因曰以此非莊嚴是名莊嚴之故須菩提彼諸菩薩摩訶薩應當亦如是自生其清淨本心離去一切塵相不應住著目之見色別生其心不應住於聲香味觸法而生種種塵心我之本心原來清淨眾物靈明獨照應當于六塵中一切無所住著本心孤露時時發現而生其清淨之心則此所生之心方是我本心之自生耳此心一生遍滿虗空矣須菩提譬如有人焉其身如須彌山王高廣至三百三十六萬里如是之大於汝意中云何見如是等之身信為大不乎須菩提答言若止言形骸之身果然甚大矣然僅形體耳世尊是何以故葢佛所說是指人本性不著形相乃法身非色身也法身到處應現是名為大身耳釋然燈即定光佛須彌於山中最尊故曰王無為福勝分第十一前言無證無得無嚴似乎因果涉空矣不知無為之修其福更勝葢法施總就他本然之性令人自悟原無施為也一切空相乃現成公案不假施為故佛又呼而告之曰須菩提世人求福係是身外作為究竟有盡如彼恒河中所有沙石之數不可計量又如是沙等之恒河於汝意中云何是諸恒河沙寧為多不耶須菩提答言曰為數至此可謂甚多矣世尊但說諸恒河尚多無數何況其沙愈不可計量乎佛因呼須菩提曰我非泛論河沙也今以真實之言告汝設若有善男子善女人以七寶充滿爾中處所之恒河沙數三千大千世界都以之用為布施如此則得福多不乎須菩提又答言曰布施至此亦云甚多矣世尊以為多乎佛又告須菩提曰布施如河沙雖得福德多畢竟有盡期設若有善男子善女人於此所說經中乃至承受持誦四句偈等盡為他人解說令人己各明本性同登彼岸而此福德無量勝前所說施財福德可見法施豈落有為之迹乎釋恒河西方河名尊重正教分第十二此分足上未盡之旨分兩截看先從說經之處以及於持經之人自四句偈至全經是由淺以入深後又從持經之人以及於經所在處自成就菩薩至有佛與弟子是由深而入淺也兩大弟子重復編次佛言曰須菩提若有人隨身所到之處即為他人解說是經乃至四句偈等法語盡皆為人解說當知此說經之處不著形象行一無所得心一切世間天人阿修羅皆應歡喜敬信供養此說經之人即其說時皆如來全身舍利所發現如來塔廟咸生嚴敬說法者尊重加此何況有人奉此經文盡能一身承受一心謹持對卷而讀離卷而誦其法力更何如耶須菩提當知是人已到無相之地成就世間最上第一希有之佛法悟到性空與佛無二若是持誦經典此人所在之處即為有佛在之處自性即佛也為人說法亦佛也了悟不疑如親受如來傳示者豈非此人即若如來之可尊可重之大弟子乎釋阿修羅嗔恨心重者天人畜生中皆有之如法受持分第十三此分標般若實際也根上無相無住福德無量來要人知佛所說法在人自悟不在語言文字尋取連名目總是假象人當照依此法受持也當爾時須菩提白佛言曰世尊目前所說之經文當何名此經我等既聞是經旨又當云何奉行持守於心也佛因告須菩提曰是經當名為金剛般若波羅蜜以是名字之意汝當奉持其所以奉持之者宜何如須菩提佛所說之般若波羅蜜正以本性空明不著塵相還我本來佛法都假若有一定之智慧可稱彼岸可到即此非是般若波羅蜜是名般若波羅蜜也須菩提汝於此意云何須會如來住世普度群迷到處為人說法其寔真法自在人本性中非語言文字所能了其有所說法不耶須菩提白佛言曰世尊法自在人性中如來實無所可說也佛又告之曰須菩提我思世界都空原是如此於我所見之意又云如何哉試觀三千大千世界亦至廣矣其中所有微塵處處布滿是為多不乎須菩提言曰甚多世尊佛因言曰須菩提是諸微塵總是眾生心上因緣轉流變現若性本清淨一塵不染則萬象俱空故如來所說微塵是說非微塵所能污之本性是名微塵而在塵離塵也積塵成世倘微塵都空世界何有故如來所說世界是說非世界所能囿之性法是名世界而在世離世也微塵世界若不如此理會便逐幻相生死輪迴不得出頭矣須菩提於汝意中云何理會今要見如來者可以三十二相見如來不耶須菩提答曰不也世尊不可以三十二相見如來者何以故蓋如來三十二相皆從三十二行得之非實有形相也所以如來說三十二相即是非眾生所見之相乃其法性圓明自然形體光輝是則名為三十二相夫然則要見如來定須於本性尋取也佛因告之曰須菩提設若有善男子善女人以恒河沙相等之身命用為布施助行善事設若復有世人於此經中所說乃至受持四句偈等法意盡為他人解說指迷成覺以視身命布施雖得福報畢竟不明本性豈如自度度人共登彼岸其福為甚多乎釋如來妙相一足下有平滿相二足下千輻輪文無不圓滿三手足並皆柔軟如兜羅綿四兩足一一指間猶如雁王文同綺畵五手足諸指圓滿纖長可愛六足跟廣長圓滿與趺相稱七足趺修高光滿與跟相稱八雙腨漸次纖圓如鹿王腨九雙臂平立摩膝如象王鼻十陰相藏密十一毛孔各一毛生紺青宛轉十二髮毛右旋宛轉十三身皮細薄潤滑垢水不住十四身皮金光晃耀諸寶莊嚴十五兩足兩掌中頸雙肩七處充滿十六肩項圓滿殊妙十七膞腋悉皆充實十八容儀洪滿端直十九身相修廣端嚴二十體相量等圓滿二十一額臆并身上半威容廣大如獅子王二十二如來常光面各一尋二十三齒相四十齊平淨密根深白瑜珂雪二十四四牙銛白鋒利二十五如來常得味中上味二十六舌相薄淨廣長能覆面輪至耳髮際二十七梵音詞韻和雅隨眾多少無不等聞二十八眼睫猶若牛王紺青齊整二十九眼睛紺青鮮白紅環三十面輪猶滿月眉相皎淨如天帝兮三十一眉間有白毫相柔軟如綿白瑜珂雪三十二頂上烏瑟膩沙高顯周圓猶如天葢三十二行者眼耳鼻舌身五根中具修六波羅蜜謂布施持戒忍辱精進禪定智慧也於意根中修無住無為也離相寂滅分第十四此分分四段自白佛言至第一波羅蜜乃是印契佛心入佛知見自忍辱波羅蜜至即非眾生乃逆空生疑施身命之難破以五蘊寔法暗結無住之問自真語至無寔無虗又結令諦信佛心莫起疑念自菩薩無住法至無邊功德也總是塵相之宜空受持功德之難及於爾時須菩提聞說是經深解其意義趣味自恨解悟之晚也涕淚悲泣而白佛言曰此經真世所希有者乎世尊佛今說如是甚深奧之經典我從昔日受生以來所得智慧法眼未曾得聞如是之經義世尊設若如今復有人得聞是經遂起信心悟得本性清淨埽除幻影真體發現即生自有之實相當知是人已能成就第一等希有之功德世尊然是實相者豈真實有之即是非相就其本性圓明與向外之幻相逈別是故如來信說名之為實相耳世尊我今親在佛前得聞如是經典真信不疑曉解妙義合下領受永久持守不足以為煩難設若當將來世界後此五百歲佛已滅度僅存像法其時倘有眾生得聞是經如我之信解受持是人則為第一希有何以故哉葢此人從經悟入即已無我相人相眾生相與壽者相矣所以能無四相者何也種種幻相本性原無知我相即是非相方得真空其一切人相眾生相壽者相即是非相總可例觀之也又何以故葢形相俱六塵染著之空華故有此形相便已埋藏本來真性所以離一切諸相便是佛性則名為諸佛矣佛因告須菩提曰汝之所解果然如是如是設若後世復有人得聞是經歡喜領受絕不驚疑沉思靜悟了不恐怖勇猛精進毫不畏阻當知是人甚為希有又何以故須菩提如來所說之波羅蜜原有十種只此等布施為第一波羅蜜葢此布施並不著相已能直明本性萬行都圓豈但無四相并無法相即此非有第一波羅蜜之心盡空無相是方可名為第一波羅蜜也須菩提且如凡人最難遣者瞋恨之心極能壞亂性行所以學佛之人忘人我相任行凌虐付之不聞此為忍辱波羅蜜然使形相未空根芽尚在也如來說非有忍辱波羅蜜心此何以故葢忍辱亦極難耳須菩提如我昔在前世曾為歌利王割截身體辱亦至矣我於爾時無我相無人相無眾生相無壽者相也何以故而能然也我於往昔節節支解之時設若有我相人相眾生相壽者相塵心未盡應生嗔恨如何似刀斫虗空乎須菩提我又思念過去於五百世前曾作忍辱仙人於爾時處所之世無我相無人相無眾生相無壽者相所以能作忍辱功行耳知是之故須菩提凡求佛性之菩薩應離一切形相而發阿耨多羅三藐三菩提之心不應住著於色而生其心不應住著於聲香味觸法而生其心應生一切形相無所住著之心若此心一有住著便失真性則為非我本來常住之妙體矣是故佛說求菩薩之心不應住有色相方行布施須菩提若菩薩六根清淨心無住著豈是欲求福利不過慈悲眾生皆有佛性故以法施開悟之為利益一切眾生應如是布施所以如來常說一切諸相即是非有真寔形相總為虗幻又說一切眾生同一佛性迷則眾生悟即是佛即非有一定不移眾生之相也須菩提如來所說之法是真切語者是誠實語者是如如不動之本性非幻妄無常之語者是真心慈悲不為欺誑之語者是至常之理不為怪異之語者須菩提如來真性中所得之法此法盡滅形相不可謂真實法性普現不可謂虗空無實無虗斯真法性耳須菩提凡所說性總隨人迷悟淺深迎機化導若悟本性佛法都假若菩薩之心住著於法解而行布施是將法障遮蔽性體如人入黑暗中即無所見若菩薩之心不住著於法解而行布施法本無法真性獨露如人有目日光明照見種種形色此其所以無住心也須菩提當將來之世設若有善男子善女人能即於此經典受持讀誦契悟無相無住妙義便知己性即為如來此人智慧即佛智慧以佛之智慧普照眾生悉知是等人悉見是等人若悟無相便得真如永劫自在皆得成就無限量無邊岸之功德也釋歌利王是梵語此言無道極惡君也昔如來修忍辱行證初地菩薩在山中宴坐遇歌利王即憍陳如出施獵王乃憩息睡醒不見左右彩女遂親入山尋見眾妃宮人圍繞禮拜仙人王乃大怒問曰云何恣情觀我女色仙人曰於諸女色實無貪著王曰云何見色不貪仙人曰持戒王曰何名持戒仙人曰忍辱即是持戒王乃持刀割仙人身問曰還可痛否仙人曰寔不痛王即節節支解之問曰還可痛否仙人曰寔不痛其時輔相大臣諫曰彼之大士逢斯患苦顏色忻然無所搖動奈何大王如斯刑害王乃止持經功德分第十五此分兩言功德前言經所有之功德後言人所成就之功德一日三時言其勤以恒河沙言其多以身布施言其難如是無量劫言其久人為荷擔之人是人以經重也處為供養圍繞之處是處亦以經重也佛又言曰須菩提設若有善男子善女人於初日出時分以恒河沙等身體行方便布施中日分復以恒河沙等身布施後日晚時分亦以恒河沙等身布施有如是無限量百千萬億劫數都以身體行方便布施可云多矣然受福報止在一身終有盡期豈若復有求佛之人聞此經典信心順受曾不拒逆悟明真性何止享用頑福其獲福已為勝彼何況不止利益一身又將此經書寫受持讀誦廣為眾人解說其獲福更何如乎須菩提設以經中切要旨意言之是經有不可心思論議不可稱數計量無有邊岸之功德葢人能受持經典自度度人此豈小乘因果所以此經如來不止教人修身出世成就一己而已寔為發大乘者說大乘者普載一切眾生同到彼岸已是菩薩地位矣猶未也直為發最上乘者說最上乘則不止普度眾生并菩薩而兼載之方是成佛地位也其法力廣大如此故設若有人能受持讀誦廣為人說便是了徹原來真性開悟無窮眾生如來悉知是人悉見是人皆得成就不可計量不可稱數無有邊岸不可思議功德如是信經人等即為一肩荷擔得如來阿耨多羅三藐三菩提者矣是何以故須菩提若喜樂小乘法者止知有己何知有人便是著我見人見眾生見壽者見惑于幻相迷失真空即於此經中無相妙義毫無領受於己不能聽受讀誦為人不能解說開悟是將不可思議功德輕棄之矣須菩提隨世界在在處處若有此經一切世間天人阿修羅所應供養者也當知此經所在之處即為是佛住之塔眾生皆應起恭敬心作禮圍繞以致恭以諸種華香供養而散滿其處蓋此經為無相真性佛與眾生同向此中皈依烏得不信受奉行也釋後日分晚時也能淨業障分第十六福罪從來相對言福不言罪則此疑不破但能生清淨心業障自無處安著總顯受持之益耳兩大弟子復編次佛言曰須菩提設有善男子善女人能受持讀誦此經宜有福報矣若反為人輕賤必是人先世造有罪孽今世應墮惡道中以今世人輕賤之故准抵得先世罪孽即盡為消滅免受惡報罪孽既消真性亦悟當得阿耨多羅三藐三菩提是皆持經之報也須菩提即以我證之我思念過去無量阿耨祗劫數在於然燈佛之前得值八百四千萬億那由他諸佛我悉皆供養承接奉事無空過者以此求福恒情必以為多設若復有人於後來末法之世能受持讀誦此經其所得功德於以較我所供養諸佛之功德我百分尚不及其一分直推到千萬億分乃至筭數譬喻所不能窮盡之數亦所不能及葢供佛止求福報而持經則圓明本性永脫輪迴是豈有可較量者耶須菩提若有善男子善女人於後末世有受持讀誦此經所得功德以前所論亦約略言之耳我若詳細具說此持經功德者或有人聞我所說將驚怖其言阿漢無極反致其心即顛倒狂亂狐疑不信以故我尚未具說耳須菩提當知是經義深遠不可以心思意議窮盡則持經功德其果報亦不可以心思意議窮盡也葢經義為般若本性無相無住非有非無之妙法悟後境界固有如是耳釋梵云阿僧祗此云無央數也梵云那由他此云一萬萬也究竟無我分第十七此問重興較前深邃辭句不移意不相侔因從前都是破除我執纖塵不留真如界內絕無佛生之假名故無佛可成無生可度無法可建無土可嚴前言降住至此則降住之法亦不可有也總之究竟來只是無我菩薩通達無礙覿體真如故耳於爾時須菩提白佛言曰世尊善男子善女人發阿耨多羅三藐三菩提之心者云何應是我性所安住云何降伏其幻妄之心佛告須菩提曰善男子善女人能發阿耨多羅三藐三菩提心者當生如是之心我應滅一切眾生不善之心度一切眾生皆悟本性滅度一切眾生已畢矣而我心中不起一念無有一眾生實是我滅度者此何以故能忘故也須菩提若菩薩有我相人相眾生相壽者相便是妄想現前豈是真空本性即非菩薩所以如此者何須菩提真性本來具足實無有法發阿耨多羅三藐三菩提心者耳須菩提於意將云何哉如法可得宜如來先得之矣試觀如來昔於然燈佛處所曾傳有何法得阿耨多羅三藐三菩提不乎須菩提知之答曰不也世尊如我解佛所說之義佛於然燈佛所寔無有法可得阿耨多羅三藐三菩提良由本性止在自求故耳佛印可其言曰如是如是須菩提果是實無有法令如來得阿耨多羅三藐三菩提也須菩提設若有法而如來得阿耨多羅三藐三菩提者然燈佛即當以法相授即不當與我空授記號說汝於來世當得作佛號為釋迦牟尼以此本性只在自修自證略借言語解說總屬掃除以實無有法得阿耨多羅三藐三菩提以是之故然燈佛但與我授記因作是言云汝於來世當得作佛號釋迦牟尼此外別無付囑也何以故所稱如來者即此一切諸法空得淨盡便是我真如妙義卓卓現前也設若世人有言如來是明真性以得阿耨多羅三藐三菩提者須菩提乎是真知實無有法佛得阿耨多羅三藐三菩提者也佛說只是渾話菩薩總是假名須菩提須識如來所得之阿耨多羅三藐三菩提其於是箇中萬相盡空即是無實真如獨露種種現前即是無虗無寔無虗真如來所得法也是故如來說一切法皆是佛法若有分別便著形相有棄有取都是錯認須菩提我所言一切法者以我真性無相可著即此一切法原非寔有若論真空法盡消滅非一切法者是即法之本來面目也故名為一切法耳須菩提譬如人身若據形相不過尋丈豈可言為長大乎須菩提深契佛旨乃言曰世尊如來說人身長大即其真性為能遍滿虗空非是形色之大身是故名為大身也佛因言曰須菩提菩薩亦同如是大身不著形相若其作是言謂我當滅度無量眾生則是我相未除真性隔礙即不名為菩薩矣夫何以故須菩提實無有法存我本性中斯名為菩薩是故佛說只此世間一切法都是虛假若論真性渾然無別原無我無人無眾生無壽者耳須菩提設若菩薩作是言云我當離却塵俗別求莊嚴佛土境界便落幻相未契真如是不名為菩薩矣此何以故如來所說莊嚴佛土者只在本性淨清即非在形色上見莊嚴是名為本性莊嚴也須菩提若菩薩不著形相遍現真如四通八達總是佛法無有執定我法之心以迷障虗空法性者如來方說此菩薩之名真是菩薩耳究竟末後一段一切盡空方完本性也釋梵云釋迦此云能仁謂其包含一切梵云牟尼此云寂默謂其如如不動一是作用一是本體也一體同觀分第十八此根上不見眾生可度無土可淨通達無我而來見得真性妙明與眾生過現來一體同具眾生不露本來心眼遂至種種菩薩只一如如攝五為一以一束萬無所不見無所不照三際平等萬法歸一絕不分別看待也佛言曰須菩提於汝意中果且云何如來無法之法圓照不窮可有照見眾生胎卵濕化起滅因緣之肉眼不須菩提答曰誠如是也世尊如來有肉眼也佛又曰須菩提於意云何如來有照見天界日月風雲運行因緣之天眼不須菩提答曰誠如是也世尊如來有天眼也佛又曰須菩提於意云何如來有照見二乘慧性淺深輪迴度脫之慧眼不須菩提答曰誠如是也世尊如來有慧眼也佛又曰須菩提於意云何如來有照見菩薩法身廣大充滿三界之法眼不須菩提答曰誠如是也世尊如來有法眼也佛又曰須菩提於意云何如來有照見佛身放光普照了無障礙之佛眼不須菩提答曰誠如是也世尊如來有佛眼也佛又曰須菩提如來何以能普照如是乎於汝意中將云何也如恒河中所有沙固已纖細無數佛說是沙不須菩提答曰如是世尊如來說是沙也佛又曰須菩提於意云何如一恒河中所有沙有如是沙等恒河合是諸恒河所有之沙數以數佛世界亦復如是寧為多不乎須菩提答曰果甚多也有如世尊之言也佛因告須菩提曰即爾所在國土中猶恒河之一沙耳其所有眾生又復無數各自有心各成起滅若干種心如來悉能知之何以故蓋如來說眾生之諸種心總從六塵影現皆為非真寔本心若本心則歷無量劫圓明不變是則名為本心耳所以然者何哉須菩提汝試觀眾生已過去之心當時則有一往便無能常留不滅乎不可得也再觀眾生現在之心忽然著相究成虗妄能寔守不變乎不可得也又觀眾生未來之心時事未臨於何疑議能豫設不失乎不可得也可見一切妄心盡是幻相若能除却三心便是佛心又何菩薩通達無我法者而不能滅度之耶釋過去現在未來所謂三際也法界通化分第十九此分言佛身充滿法界無不流通度化不住相布施然也修菩薩心者亦復如是前言福德皆以布施與持經較量此不言比量但言布施者以是因緣從上無心生來能施人所施物受施人三緣和合而有既知緣合則全體是空故無我也無住無相可與持經等第八分中言福德即同此義如來知空生已悟到此而又重言之者欲再發明無住色福德不可量耳佛言曰須菩提汝於意云何設若有人布滿三千大千世界七寶以之用為布施是人以是布施因緣得福可為多不須菩提答曰如是世尊此人以是因緣得福甚多佛因曰須菩提若是等福德所有但實在財施享用有盡如來不說得福德多也如來所說福德多者是說本性菩提自度度人各悟無相真空以福德原無所著故如來說得福德多耳釋佛以大悲為因眾生為緣離色離相分第二十此分與五分十三分相呼應總為眾生每每以色相求佛故以是破之耳十七分內如來以己分上事示菩薩教其亦如是至十八分言如來以五眼觀眾生通因徹果皆是無相十九分之福德因無相二十分之具足果無相向後二十一分之于法無說二十二分之于法無得一一皆如來事至二十三分顯是法平等教菩薩以無相行善正以明佛果也故二十四分仍以福德結之佛言曰須菩提於汝意云何人欲見佛可以三十二相具足之身色見之不耶須菩提答曰不也世尊如來不應以具足色身見也是何以故如來所說具足色身乃至三十二行中所呈露即非從形色上見此具足色身也而真相無相已在其中是名具足色身耳佛又言曰須菩提於意云何如來可以八萬四千具足諸相見不耶須菩提答曰不也世尊如來不應以具足諸相見也是何以故如來所說諸相具足乃智慧光明神通廣大即非外貌上見此具足也而無相無法已具于是是名諸相具足耳則離却色相反觀自性如來真面目在此矣釋諸相者種種變現之相也又不止于三十二相而已如來離色離相以淨行則具足三十二以智慧則具足八萬四千具足三明六通八解脫此之具足即非諸相之所謂具足也然此之具足乃其寔而諸相具足乃其華耳充其寔則華自副之是以有諸相具足之名非說所說分第二十一佛為覺悟眾生只得以言語化導其寔都是借來的比方若認定言語就是真法便像指人影子說是真形反把真形瞥眼失之要知所說法正在那非說處方是佛之真性也空生已悟法身無說矣又恐此法甚深未來眾生不信故如來破其眾生之見令知本自如如也佛言曰須菩提汝勿謂如來作是念謂我當為眾生另有所說法是法障也切莫作是念也何以故哉設若人言如來有所說法反是違背真諦即為謗佛葢如來說法本意原欲人明心見性不欲人依文傍義如拘滯言下是不能解我所說真諦之故便為傍佛也須菩提當知如來說法者法在人心本無法可說是名真說法耳爾時具智慧通命源之須菩提深契佛旨因白佛言曰世尊頗有眾生於未來世聞說是無法之法能生信心當下明悟不耶佛言曰須菩提彼眾生總是業相變現業盡即空非寔有眾生形相與佛異性然而業相現在不得解脫又非不是眾生是何以故須菩提此亦一眾生彼亦一眾生雖有種種不同者如來說咸非寔有眾生形相俱有佛性隱于其中是以名眾生形相自假本性自真則安得聞佛所說不生信心也釋命者壽之意壽者老之意慧命者言須菩提既得慧眼且年高矣唐長慶二年僧靈幽入冥所加此慧命以下六十字無法可得分第二十二妙性本空無有一法可得此等前已言之前標般若之法此則以自己分上事示菩薩故不妨重言也無所說者為真說則亦無所得者為真得矣故須菩提白佛言曰世尊我佛妄盡覺滿得此阿耨多羅三藐三菩提豈非以萬法俱空一靈獨炤正為無所得乃為真得耶佛深然之因言曰如是如是須菩提我於阿耨多羅三藐三菩提直覺廓然空寂無名無相乃至無有纖毫少法可得止為覺世故是以名之為阿耨多羅三藐三菩提使人知所皈依耳倘錯認有法可得便失之矣淨心行善分第二十三上言菩提無法可得正以是法平等故是佛勸化眾生絕去塵想淨心行善便證菩提也既曰無法可得恐人落無故曰平等不妨修一切善法既曰修一切法恐人執有故又言一切善法即非善法步步回顧無相法不失無寔無虗之旨而下分又以福德結之無法可得是名無上菩提而菩薩欲得無上菩提當以何修耶弟子因復編次佛言曰須菩提是法性原自平等佛與眾生同然無有高下若是空去根塵真性顯露無論佛與凡夫總是名為阿耨多羅三藐三菩提也葢此真性本來清淨一切眾生都以無我無人無眾生無壽者之相修一切善法則以平等心合平等法與如來同一無法可得即得阿耨多羅三藐三菩提矣須菩提要知所謂善法者不過借以接引眾迷耳及到彼岸善法俱空如來說即非膠滯此善法方是真寔了義是名善法也要之得無所得亦修無所修故耳釋一切善法如布施忍辱持戒精進之類是也福智無比分第二十四真性上福智歷劫無盡無可比方上言善法皆空恐人又以經文為空言故又較量福德之殊勝然修無可修非為可以不修也佛言曰須菩提設若三千大千世界之中所有百億諸須彌山王積如是山等之七寶以成聚有人持用布施其福德亦已無量若人以此般若波羅蜜經乃至四句偈等法語自己受持讀誦且為他人解說利益無窮包盡虗空於前所說布施福德雖再有如是百分不及持經功德之一即加至百千萬億分乃至筭數不盡直到譬喻極多之分數亦所不能及此一分也自度度人之功德固如此釋須彌山東方玻璃峯紅色南方琉璃峯青色西方真金峯赤色北方白玉峯白色以喻報身佛有四相也化無所化分第二十五眾生本來寂滅原無所藉于如來化無所化即是法平等之一證十七分云菩薩通達無我法真是菩薩身上事至此分起復以如來本分之無我者示之然而寔無有度人之法也佛言曰須菩提於此中之意其云何耶汝等勿謂如來作是念云我當用佛法施以度一切眾生須菩提如來莫作是念其何以故哉葢般若真性如來不增眾生不減度其所自有非益所本無也實無有眾生是如來度者耳設若見有眾生為如來所度者便生分別相矣使如來見得我能度化即為有我又見人因我度即為有人度他離塵登我法界即為有眾生度他出生死不入輪迴即為有壽者一念不忘我相畢具如來豈有此耶須菩提然如來所以說有我者對人言之耳若論真性人我何別有我即非有我也而凡夫之人認錯幻相以為有我須菩提此眼前未度之凡夫者如來常說其元來真相空寂自在即非寔有凡夫相也是則為凡夫已耳然則如來凡夫一也又豈有能度之如來所度之眾生也哉釋前就說即非說上起議次就得亦無得上起議此文就度亦無度上起議次第秩然法身非相分第二十六不可以三十二相觀如來須菩提前答已明非前解後轉不解也求其意須菩提以應身相好從法身流出若見相好即見法身故答云如是然佛又恐眾生但執相好以觀如來故難以轉輪聖王後又決明之二我字指人人自有之性見如來見我也夫非我之我充滿法界則亦可於此深思而得矣故佛言曰須菩提汝於此中之意果云何也今欲見如來者可以三十二相觀如來不也須菩提答言曰如來即相非相不必離相目見真相如是如是即以三十二相觀如來無不可也佛又恐凡夫之見因須菩提言遂執色相以求如來故呼而言曰須菩提若但以三十二相觀如來者則轉輪聖王亦具是相即是如來矣彼真正如來將於何見之須菩提如佛覺人深意因白佛言曰世尊如我解會佛所說妙義如來自有性中法相豈區區色身可盡耶不應以三十二相觀如來也爾時世尊即將此法義而說為偈言曰若人以色身端好上見我以說法音聲上求我不離聞見悞認法身是人所行墮入邪道永隔性真不能見如來真面目矣故曰若見法相非法相即見如來釋轉輪聖王是為四天王正五九月炤南閻浮提二六十月炤西瞿耶尼三七十一月炤此單越四八十二月炤東弗婆提無斷無滅分第二十七寔際理地固不受一塵佛事門中初不可舍一法雖無眾生可度而六道常援雖不住相布施而財寶樂施雖無法可說而常轉法輪雖無道可修而常行精進雖夢幻一切而因果歷然只說有相即空原非指空為性也因前教菩薩離一切相發心又教寔無有法發心恐不解佛所說第一義諦無寔無虗又近聞前章以色相聲音為邪道皆無法可得恐人認作頑空故戒以不可斷滅一切法也法相固非法矣然非頑空之謂也佛又告之曰須菩提汝設若作是念謂如來不以具足色相之故得阿耨多羅三藐三菩提將必離舍形體別生解識乎須菩提切莫作是念而謂如來不以具足相故得阿耨多羅三藐三菩提也須菩提汝設若作是念纔發阿耨多羅三藐三菩提心者是說度人諸法一切可斷滅矣法如斷滅則將何以為渡河之筏也汝切莫作是念也夫何以故凡人發阿耨多羅三藐三菩提心者於諸法相正是從入之借徑法雖不是性然性不離法不得說法相都捐竟生斷滅妄相也乃知色空雙泯亦復兩存迨至存泯俱忘而後為般若菩提耳釋就佛果已成言曰得菩薩心就須菩提修因言曰發菩提心不受不貪分第二十八當知此分是悟無我之果言菩薩法施度人心本無我故雖有法施之福德誰其受之況有貪愛之念乎其福勝七寶布施前說疊見於三千大千世界至以恒河恒加一等字寶施又進于上此所謂菩薩布施也不著色聲相不著斷滅相斯真通達無我法也佛呼而告之曰須菩提設若菩薩以滿恒河沙等世界之七寶持之以用布施其多如此若復有人知一切法都是平等毫無我相雖以法施普度而不自有其功能得成就於無生法忍則此菩薩功德勝前菩薩寶施所得功德何以故須菩提以諸菩薩雖有法施而心本無我則積聚于虗空永不消滅以此不受福德故勝前菩薩也須菩提因白佛言曰世尊云何菩薩不受福德佛告之曰須菩提葢菩薩法施福德祗為利益眾生不應為求福而生貪著想以是之故所以說菩薩不受福德也釋大般若有安受忍觀察忍修此二忍便得無生法忍此處知字是觀察忍成字便是安受忍也知一切法無我得無生法忍是諸佛心印威儀寂靜分第二十九上言如來既不可以身相觀又不可以斷滅說不落斷又恐執常故此言如來不斷不常也佛四威儀應迹耳不可以見如來是人不解我所說義即如來所說諸法如義之義又即所說不應以身相見如來之義知此二義則知如來不以威儀應化為身而以德性寂靜為身矣然則無相本體於何見之佛又呼而告之曰須菩提設若有人言如來法身若其呈現而來若其涅槃而去以及若坐若臥只在形迹動靜上求是人不能解會我所說無相之義其不解者何以故哉所謂如來者充滿虗空總是法身隨眾生業緣淺深各成所見而如來本性不曾動移無所從來之處亦無所從去之處如如自在靈應無方是故名為如來也釋眾生心淨見佛非是佛來心垢不見亦非佛去諸佛本無去來眾生妄見去來耳一合理相分第三十微塵世界十三分中已明言之至此專為應化報三分而釋其非一非異也葢言微塵則非一世界則非異微塵聚為世界即異而不異世界散為微塵則一而不一總喻佛說應化身由大悲所現非寔有應化身為報身所分也可見應化本無可析報身本無所合則猶微塵非世界所析世界非微塵所合也都非寔有悉是假名若認為寔則是一合相矣故如來說合相非真云云然則佛身真相從可知矣佛言曰須菩提設若善男子善女人以三千大千世界粉碎為微塵於汝意云何是微塵眾矣寧為多不乎須菩提言曰甚多世尊何以故若是微塵之眾實有其相者則是人身中一切雜念不可消滅言之何益佛即不說是微塵之眾所以說及者何佛所說微塵之眾乃眾生業緣起滅即非寔有微塵眾人心清淨微塵不染矣是假名為微塵眾耳世尊又如如來所說三千大千世界亦是幻相所成即非寔有世界劫數盡時世界亦壞矣是假名為世界耳唯是真性不變不移夫何以故若此世界實有者即是眾塵和合為一世界成一合相也彼世界終壞豈如真性不分聖凡渾合成一歷劫自在乎然真性渾淪直如虗空無相無名如來說是一合相者即非真有一合相亦是假名一合相也佛曰須菩提真性虗空無空擬議此一合相者即是不可說之虗空真性但凡夫之人聽佛言語不能證悟淺則貪著色塵深便貪著法相遂貪著其事而不能解脫耳然則一合之理相可以言語求乎釋一切無佛無生無斷無常無去無來總是理相一合也理者乃真空實理相者乃世界幻妄諸相也一合者理與相一而不二合而不分謂此真空寔理融通和合世界諸相也知見不生分第三十一真性本來空寂故到證入菩提時候凡心中有知有見盡滅不生矣如是二字是無知之知無見之見無信解之信解緊頂三菩提心來覺心本空相歸烏有是真住真降伏真菩提也方是第一波羅蜜夫理相一合固無相也佛又言曰須菩提設若有人言佛所說真寔有我見人見眾生見及壽者見種種情識如此須菩提汝於意中云何是人可能解我所說語義不須菩提答曰不也世尊是人不解如來所說義者又何以故也世尊所說我見人見眾生見壽者見原是外現假像不是性中真諦即非有我見人見眾生見壽者見是不過假名為我見人見眾生見壽者見耳佛言曰須菩提大凡發阿耨多羅三藐三菩提心者不但四相盡空於一切法皆是無相應如是證知如是觀見如是信心解會絕不生一毫法相方為得之耳須菩提凡是所言法相者總是接引初學令其漸進若至了徹真性空寂法相何著如來說即非寔有法相乃是假名法相耳葢不知不見不信解則生斷滅相不如是知如是見如是信解則生滯著相即非法相埽除名相之盡也是名法相顯著寔相之盡也非寔非虗如此可悟般若真性矣釋法所現者曰相心所取者曰見應化非真分第三十二此言演說法義總是應現化導之幻迹了非真寔也前云貪著其事皆是妄生知見凡夫我執未除耳故破執離相出一見字因凡夫不能離有無一異二邊見解所以不達三身之理如何得理事無礙進佛知解迷倒于相見執之堅固佛逐一以金剛明智破之如以無住破行施著相以無得破菩提執相以無土破莊嚴妄相以非具足破報身影相以非真破三身滯相以非相破法身蔽相以無我破執法身非有我相以非一非異故執如來三身定相重重逐破俾情見俱空逼歸如如不動一言蔽之矣佛言曰須菩提設若有人以充滿無盡量阿僧祗世界之七寶持用布施福非不多也更若有善男子善女人發廣大度人之菩薩心者信心奉持於此經中乃至四句偈等自己受持讀誦為人演說乎葢演說之時我與眾生都是幻相假合不可取著於形相良以真如之性無不如意應現不逐相移動也是何以故乎凡諸相中一切有所作為之法都假非真如夢寐幻妄水泡物影如露水亦如電光倐忽頓空須應作如是觀也知有相皆空本性自湛方得如如不動耳佛說是經已畢長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說經旨皆大生歡喜信心受教奉持經說而行其修證如所教住人己應皆得度矣大要全經之旨自空生問菩提心當于何住妄心於何降伏佛告以四生九有皆爾眾妄心所當滅度無我人等四相乃為大家正教以此行施無住等于虗空以此見相非相心即如來以此篤信不著非法以此自悟不假言說取舍曾知三世諸佛依經流出四果羅漢於此印證心能清淨即是莊嚴而妙法大身無有剩義心能無為福德最勝而信受解說隨處尊重因而夙障清淨究竟無我之法空過現未來三心之體湛渾通法界色相離言說空無法可說無說可得惟悟平等性施妙智福果凡聖盡融無生可度如來非可相見無相法尚不可執豈涉頑空故知法無斷滅妙湛圓通布施不貪去來非有三身一身理事合一妄見既融應化不二真空本性如如不動已耳一切有相當於何著耶經中阿耨菩提般若四句偈如來真藏總水中鹽味色裏膠青也釋究明經義曰演播釋經義曰說僧謂之比丘尼姑謂之比丘尼居士謂之優婆塞道姑謂之優婆夷䟦世尊說法四十九年經總三藏十二部五千卷達磨西來傳法二祖以楞伽經四卷印心五祖易以金剛經傳授性相宗教分途性宗輙直指單傳雲門至於罵佛藥山示人不得讀經此固為大根器說法而耳食之徒遂真擬金剛經亦可高束蘇長公謂近歲婦人孺子抵掌嬉笑爭談禪悅嗚呼是病未瘳而廢藥河未渡而舍筏也不終於痼疾迷津乎姑無論應無所住一語即可立證直超而金剛因果錄中有望空寫經遇雨不濕者有持偈言虎䑛惡瘡頓愈者有持經題七字命盡立生兜率者葢般若為諸佛母深廣不可思議當日靈山一會得度弟子雖出生死而疑根未拔本智不現及至般若會上如來以金剛智而決斷之直使聖凡情盡生滅見忘而本有智光豁然披露以是義故為正法眼藏寶函所在天人擁護註解歷唐宋明計八百餘家獨天親列二十七疑以顯教外之旨憨山復有決疑一刻叢林盛行然初入者尚苦旁註汗漫義深語奧獨此直解單行續於本經一覽如指掌果因竊念余以疎慵之質推排人間世到今五十餘年髫歲泥首一經屢遭按劍翻然易轍猥列簪裾弩力戎行勉立寸功以報聖天子知遇寅卯役祁門與潢池對壘披堅身冐矢石登山涉江呼吸生死默膺庇覆履險而安又以異夢驚疑潛心白業戊午量移皖上瞻禮三祖道場為丙申舊遊地得不寒五嶽之盟亦憶慰夙因偶獲是編如覯良師益友勇猛持誦兼捐貲以廣布流通又竊思如來一片金剛妙心與千二百五十諸大比丘徒眾朝夕給孤獨園著衣持鉢多方淘汰既盡妙密鉗錘而就裡一兔毛頭金剛藏光明尚費金篦磨刮矧此直解數行烏能竟涅盤妙諦但為發心懽喜地諸善男子引手遞入從茲直解以歷窮諸解從茲一經以遍悉諸經乃至大乘了義無一句可說無一法可得遙知十方諸佛將各伸金色臂展兜羅綿手皆以相好莊嚴妙網光舒香流𦦨發摩諸善男子頂引入三世諸佛甚深智慧海彈指間轉大法輪則茲刻亦未始非顧衣見珠得魚忘筌之一助也因合十而述於卷末云旹康凞歲在辛酉嘉平月奉佛弟子趙嶽生視公甫謹䟦
